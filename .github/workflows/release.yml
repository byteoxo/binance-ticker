name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5.3.0
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7.0.0
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect commits since last tag
        id: commits
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null \
            || git rev-list --max-parents=0 HEAD)

          git log "${PREV_TAG}..HEAD" \
            --pretty=format:"- %s (%h)" \
            --no-merges \
            > "$RUNNER_TEMP/commits.txt"

          echo "=== Commits to summarise ==="
          cat "$RUNNER_TEMP/commits.txt"

      - name: Generate release notes via OpenRouter
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          COMMITS="$(cat "$RUNNER_TEMP/commits.txt")"

          PAYLOAD=$(jq -n \
            --arg tag "$TAG" \
            --arg commits "$COMMITS" \
            '{
              model: "anthropic/claude-3.5-haiku",
              messages: [{
                role: "user",
                content: (
                  "You are writing GitHub release notes for **binance-ticker** — a terminal-based Binance futures/spot price ticker written in Go.\n\n"
                  + "Version: " + $tag + "\n\n"
                  + "Raw commits since last release:\n" + $commits + "\n\n"
                  + "Instructions:\n"
                  + "- Write a concise, user-friendly release body in Markdown.\n"
                  + "- Group changes logically: ### What'\''s New / ### Bug Fixes / ### Improvements / ### Internal — only include sections that apply.\n"
                  + "- Rewrite technical commit messages into plain language a user would understand.\n"
                  + "- Skip trivial or internal-only changes (refactors, typos, chores) unless they are significant.\n"
                  + "- Do NOT include a title or version header — start directly with the first section.\n"
                  + "- Keep the total length under 300 words."
                )
              }]
            }')

          RESPONSE=$(curl -sf \
            -X POST https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD") || true

          NOTES=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty' 2>/dev/null)

          if [ -z "$NOTES" ]; then
            echo "⚠️  OpenRouter call failed — falling back to raw commits"
            NOTES="$(cat "$RUNNER_TEMP/commits.txt")"
          fi

          echo "=== Release notes ==="
          echo "$NOTES"

          # Update the release body via gh CLI (works regardless of file paths)
          gh release edit "$TAG" \
            --repo "${{ github.repository }}" \
            --notes "$NOTES"

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"   # strip leading 'v'

          # Download checksums from the just-published release
          CHECKSUMS=$(curl -sL \
            "https://github.com/${{ github.repository }}/releases/download/${TAG}/checksums.txt")

          SHA_DARWIN_ARM64=$(echo "$CHECKSUMS" | awk '/darwin_arm64\.tar\.gz/ {print $1}')
          SHA_DARWIN_AMD64=$(echo "$CHECKSUMS" | awk '/darwin_amd64\.tar\.gz/ {print $1}')
          SHA_LINUX_ARM64=$(echo "$CHECKSUMS"  | awk '/linux_arm64\.tar\.gz/  {print $1}')
          SHA_LINUX_AMD64=$(echo "$CHECKSUMS"  | awk '/linux_amd64\.tar\.gz/  {print $1}')

          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          # Render new formula content
          cat > "$RUNNER_TEMP/binance-ticker.rb" << FORMULA
          class BinanceTicker < Formula
            desc "Terminal-based Binance futures/spot price ticker with real-time WebSocket updates"
            homepage "https://github.com/${{ github.repository }}"
            license "MIT"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/binance-ticker_darwin_arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "${BASE_URL}/binance-ticker_darwin_amd64.tar.gz"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${BASE_URL}/binance-ticker_linux_arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "${BASE_URL}/binance-ticker_linux_amd64.tar.gz"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              bin.install "binance-ticker"
              bin.install_symlink "binance-ticker" => "bt"
            end

            test do
              assert_match "Usage", shell_output("#{bin}/bt --help 2>&1", 1)
            end
          end
          FORMULA

          # Get current file SHA (required by GitHub API to update a file)
          FILE_SHA=$(gh api repos/byteoxo/homebrew-tap/contents/Formula/binance-ticker.rb \
            --jq '.sha')

          # Push updated formula to tap repo
          gh api repos/byteoxo/homebrew-tap/contents/Formula/binance-ticker.rb \
            --method PUT \
            --field message="Update binance-ticker to ${TAG}" \
            --field content="$(base64 -w0 < "$RUNNER_TEMP/binance-ticker.rb")" \
            --field sha="$FILE_SHA" \
            --jq '.content.html_url'
