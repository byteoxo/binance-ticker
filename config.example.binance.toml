# Exchange: "binance" (default), "gate", or "okx"
# When exchange is "binance", rest_base and ws_base default to Binance Futures endpoints.
# When exchange is "gate", they default to Gate.io Futures endpoints.
# When exchange is "okx", see config.example.okx.toml — use OKX instrument ids (e.g. BTC-USDT-SWAP, ETH-USDT).
# OKX account auth requires api_passphrase (or OKX_API_PASSPHRASE) in addition to api_key and api_secret.
# You can override rest_base and ws_base explicitly if needed.
exchange = "binance"

symbols = ["ETHUSDT", "BTCUSDT", "SOLUSDT"]
spot_symbols = ["ZKC", "BARD"]
chart_symbol = "ETHUSDT"
chart_limit = 16
default_panel = "futures"
timeout = "8s"
tz = "Asia/Shanghai"
# rest_base and ws_base are optional when exchange is set — defaults are applied automatically.
# rest_base = "https://fapi.binance.com"
# ws_base   = "wss://fstream.binance.com"
no_color = false
retry_delay = "2s"
api_key = ""
api_secret = ""
api_passphrase = ""
